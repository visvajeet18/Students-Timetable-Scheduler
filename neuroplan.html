<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroPlan AI Pro - Standalone</title>
    <!-- Tailwind CSS v4 Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            margin: 0;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #020617;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }

        /* Glassmorphism helpers */
        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .recharts-tooltip-wrapper {
            outline: none !important;
        }

        @keyframes pulse-soft {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.98);
            }
        }

        .pulse-node {
            animation: pulse-soft 3s infinite ease-in-out;
        }
    </style>
</head>

<body>
    <div id="root">
        <!-- Static Loader -->
        <div id="initial-loader"
            style="min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px;">
            <div
                style="width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;">
            </div>
            <h2 style="font-weight: 900; letter-spacing: 0.2em; color: white; font-size: 1rem;">NEURAL LINKING...</h2>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- Stable Core Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- UI/UX Assets -->
    <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/recharts@2.7.2/umd/Recharts.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext } = React;

        // --- Reliable State-Based Routing ---
        const RouterContext = createContext();
        const useRouter = () => useContext(RouterContext);

        const NeuralRouter = ({ children }) => {
            const [currentPath, setCurrentPath] = useState(() => {
                const hash = window.location.hash.replace('#', '');
                return hash || '/dashboard';
            });

            const navigate = (path) => {
                window.location.hash = path;
                setCurrentPath(path);
            };

            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#', '');
                    setCurrentPath(hash || '/dashboard');
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            return (
                <RouterContext.Provider value={{ currentPath, navigate }}>
                    {children}
                </RouterContext.Provider>
            );
        };

        // --- SVG Icon System (Internalized to prevent UMD errors) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const paths = {
                Brain: "M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-2.04M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-2.04",
                LayoutDashboard: "M3 3h7v9H3zm11 0h7v5h-7zm0 9h7v9h-7zm-11 11h7v-7H3z",
                Target: "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zm0-2a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm0-12a4 4 0 1 0 0 8 4 4 0 0 0 0-8z",
                RefreshCw: "M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8m0-5v5h-5",
                Settings: "M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z",
                Menu: "M4 12h16M4 6h16M4 18h16",
                Trash2: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6",
                PlayCircle: "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zm-2-13.5l6 3.5-6 3.5v-7z",
                CheckCircle2: "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zm5-13l-6 6-3-3"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={paths[name] || ""} />
                </svg>
            );
        };

        // --- Context & State ---
        const StudyContext = createContext();
        const useStudy = () => useContext(StudyContext);

        const StudyProvider = ({ children }) => {
            const [subjects, setSubjects] = useState(() => {
                const saved = localStorage.getItem('np_v5_subjects');
                try { return saved ? JSON.parse(saved) : []; } catch (e) { return []; }
            });

            const [preferences, setPreferences] = useState(() => {
                const saved = localStorage.getItem('np_v5_prefs');
                try { return saved ? JSON.parse(saved) : { dailyHours: 4 }; } catch (e) { return { dailyHours: 4 }; }
            });

            const [examDate, setExamDate] = useState(() => localStorage.getItem('np_v5_exam') || '2026-06-15');

            useEffect(() => localStorage.setItem('np_v5_subjects', JSON.stringify(subjects)), [subjects]);
            useEffect(() => localStorage.setItem('np_v5_prefs', JSON.stringify(preferences)), [preferences]);
            useEffect(() => localStorage.setItem('np_v5_exam', examDate), [examDate]);

            const addSubject = (name, difficulty) => {
                const newSub = {
                    id: Math.random().toString(36).substr(2, 9),
                    name,
                    difficulty: Number(difficulty),
                    topics: [],
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`
                };
                setSubjects([...subjects, newSub]);
            };

            const stats = useMemo(() => {
                const total = subjects.reduce((acc, s) => acc + s.topics.length, 0);
                const done = subjects.reduce((acc, s) => acc + s.topics.filter(t => t.completed).length, 0);
                return { total, done, progress: total > 0 ? Math.round((done / total) * 100) : 0 };
            }, [subjects]);

            return (
                <StudyContext.Provider value={{
                    subjects, setSubjects, addSubject, stats, examDate, setExamDate, preferences,
                    updatePrefs: (p) => setPreferences(prev => ({ ...prev, ...p }))
                }}>
                    {children}
                </StudyContext.Provider>
            );
        };

        // --- UI Elements ---
        const Card = ({ children, className = "", delay = 0 }) => {
            const motion = window.FramerMotion ? window.FramerMotion.motion : null;
            if (!motion) return <div className={`glass-card rounded-3xl p-6 ${className}`}>{children}</div>;
            return <motion.div initial={{ opacity: 0, y: 15 }} animate={{ opacity: 1, y: 0 }} transition={{ delay, duration: 0.4 }} className={`glass-card rounded-3xl p-6 ${className}`}>{children}</motion.div>;
        };

        const Sidebar = ({ isOpen, toggle }) => {
            const { currentPath, navigate } = useRouter();
            const items = [
                { n: 'Dashboard', p: '/dashboard', i: 'LayoutDashboard' },
                { n: 'Strategy', p: '/create-plan', i: 'Target' },
                { n: 'Workstation', p: '/revision', i: 'RefreshCw' },
                { n: 'System', p: '/settings', i: 'Settings' },
            ];

            return (
                <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-[#020617] border-r border-white/5 transition-transform duration-500 lg:translate-x-0 ${isOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                    <div className="flex h-full flex-col px-6">
                        <div className="h-24 flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg"><Icon name="Brain" className="text-white" /></div>
                            <span className="text-xl font-black text-white tracking-tighter uppercase">Neuro<span className="text-blue-500">Plan</span></span>
                        </div>
                        <nav className="flex-1 space-y-2 py-4">
                            {items.map(item => (
                                <button key={item.p} onClick={() => { navigate(item.p); if (window.innerWidth < 1024) toggle(); }} className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-bold transition-all ${currentPath === item.p ? 'bg-white/5 text-white' : 'text-slate-500 hover:text-slate-300'}`}>
                                    <Icon name={item.i} size={20} className={currentPath === item.p ? 'text-blue-500' : ''} />
                                    {item.n}
                                </button>
                            ))}
                        </nav>
                        <div className="py-8 border-t border-white/5 flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white">V</div>
                            <div><p className="text-sm font-bold text-white">Visva</p><p className="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Active Node</p></div>
                        </div>
                    </div>
                </aside>
            );
        };

        // --- Pages ---
        const DashboardPage = () => {
            const { stats, subjects, examDate } = useStudy();
            const Recharts = window.Recharts || {};
            const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;
            const chartData = [{ x: 'M', y: 2 }, { x: 'T', y: 4 }, { x: 'W', y: 1 }, { x: 'T', y: 5 }, { x: 'F', y: 3 }, { x: 'S', y: 6 }, { x: 'S', y: 2 }];

            return (
                <div className="max-w-6xl mx-auto space-y-8">
                    <header className="flex justify-between items-end flex-wrap gap-4">
                        <div><h1 className="text-4xl font-black text-white">Focus Engine</h1><p className="text-slate-400 mt-2">Target Node: <span className="text-blue-500 font-bold">{examDate}</span></p></div>
                        <div className="bg-slate-900/50 px-6 py-3 rounded-2xl border border-white/5 shadow-2xl">
                            <p className="text-[10px] uppercase font-bold text-slate-500 tracking-widest">Efficiency</p>
                            <p className="text-xl font-black text-white">{stats.progress}%</p>
                        </div>
                    </header>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        {[{ l: 'Nodes', v: stats.total, c: 'blue' }, { l: 'Retention', v: '84%', c: 'emerald' }, { l: 'Peak', v: '09:30', c: 'orange' }, { l: 'Streak', v: '12D', c: 'purple' }].map((s, i) => (
                            <Card key={i} className={`border-l-4 border-${s.c}-500`}><p className="text-xs font-bold text-slate-500 uppercase">{s.l}</p><h2 className="text-3xl font-black text-white mt-2">{s.v}</h2></Card>
                        ))}
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <Card className="lg:col-span-2 min-h-[350px]">
                            <h3 className="text-xl font-bold text-white mb-8">Neuro-Load Trend</h3>
                            <div className="h-64 w-full">
                                {AreaChart ? (
                                    <ResponsiveContainer width="100%" height="100%">
                                        <AreaChart data={chartData}>
                                            <XAxis dataKey="x" hide /> <YAxis hide />
                                            <Tooltip contentStyle={{ background: '#0f172a', border: 'none', borderRadius: '12px' }} />
                                            <Area type="monotone" dataKey="y" stroke="#3b82f6" fill="#3b82f622" strokeWidth={3} />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                ) : <div className="flex items-center justify-center h-full text-slate-600 italic">Visualizer offline</div>}
                            </div>
                        </Card>
                        <Card>
                            <h3 className="text-xl font-bold text-white mb-6">Mastery Distribution</h3>
                            <div className="space-y-4">
                                {subjects.slice(0, 5).map(s => {
                                    const p = s.topics.length > 0 ? (s.topics.filter(t => t.completed).length / s.topics.length) * 100 : 0;
                                    return (
                                        <div key={s.id} className="space-y-1">
                                            <div className="flex justify-between text-xs font-medium"><span className="text-slate-300 truncate pr-4">{s.name}</span><span className="text-blue-500">{Math.round(p)}%</span></div>
                                            <div className="h-1 bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-blue-500" style={{ width: `${p}%` }}></div></div>
                                        </div>
                                    )
                                })}
                                {subjects.length === 0 && <p className="text-slate-600 italic text-sm py-10 text-center">Zero nodes active.</p>}
                            </div>
                        </Card>
                    </div>
                </div>
            );
        };

        const StrategyPage = () => {
            const { subjects, setSubjects, addSubject } = useStudy();
            const [name, setName] = useState('');
            const [syllabus, setSyllabus] = useState('');
            const [activeId, setActiveId] = useState(null);

            const parse = () => {
                if (!activeId || !syllabus) return;
                const topics = syllabus.split('\n').filter(l => l.trim().length > 2).map(n => ({ id: Math.random().toString(36).substr(2, 9), name: n, completed: false }));
                setSubjects(prev => prev.map(s => s.id === activeId ? { ...s, topics: [...s.topics, ...topics] } : s));
                setSyllabus('');
            };

            return (
                <div className="max-w-6xl mx-auto space-y-8 pb-12">
                    <h1 className="text-4xl font-black text-white">Strategy Engine</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="space-y-6">
                            <Card className="bg-blue-600/5 border-blue-500/20">
                                <h3 className="text-lg font-bold text-white mb-4">Add Node</h3>
                                <input value={name} onChange={e => setName(e.target.value)} placeholder="Subject Name..." className="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white outline-none mb-4 focus:border-blue-500" />
                                <button onClick={() => { if (name) { addSubject(name, 3); setName(''); } }} className="w-full py-4 bg-blue-600 rounded-xl font-black text-white hover:bg-blue-500 shadow-lg shadow-blue-600/20">Deploy Node</button>
                            </Card>
                            <div className="space-y-2">
                                {subjects.map(s => (
                                    <div key={s.id} onClick={() => setActiveId(s.id)} className={`p-4 rounded-xl border cursor-pointer flex justify-between items-center transition-all ${activeId === s.id ? 'border-blue-500 bg-white/5' : 'border-white/5 bg-slate-900/40 hover:bg-slate-900/60'}`}>
                                        <span className="text-white font-bold">{s.name}</span>
                                        <button onClick={e => { e.stopPropagation(); setSubjects(subjects.filter(sub => sub.id !== s.id)); }} className="text-slate-600 hover:text-red-500"><Icon name="Trash2" size={16} /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <Card className="lg:col-span-2 min-h-[450px] flex flex-col">
                            <div className="flex items-center gap-4 mb-8"><Icon name="Brain" className="text-purple-400" /><h3 className="text-xl font-bold text-white">Neural Parser</h3></div>
                            {activeId ? (
                                <div className="space-y-4 flex-1 flex flex-col">
                                    <textarea value={syllabus} onChange={e => setSyllabus(e.target.value)} placeholder="Paste syllabus content (one topic per line)..." className="flex-1 w-full bg-slate-900 rounded-2xl p-6 text-white text-sm outline-none border border-white/5" />
                                    <button onClick={parse} className="py-4 bg-purple-600 rounded-xl font-black text-white uppercase text-xs hover:bg-purple-500 shadow-xl shadow-purple-600/20">Analyze Curriculum</button>
                                </div>
                            ) : <div className="flex-1 flex flex-col items-center justify-center text-slate-600 italic px-10 text-center"><Icon name="Target" size={48} className="mb-4 opacity-10" /><p>Select a node from the map to begin parsing.</p></div>}
                        </Card>
                    </div>
                </div>
            );
        };

        const WorkstationPage = () => {
            const { subjects, setSubjects } = useStudy();
            const toggle = (sid, tid) => {
                setSubjects(prev => prev.map(s => s.id === sid ? { ...s, topics: s.topics.map(t => t.id === tid ? { ...t, completed: !t.completed } : t) } : s));
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8 pb-12">
                    <h1 className="text-4xl font-black text-white">Focus Workstation</h1>
                    {subjects.length === 0 && <Card className="text-center py-20 text-slate-600 italic">No nodes available for tracking.</Card>}
                    {subjects.map(s => (
                        <Card key={s.id} className="mb-8">
                            <h3 className="text-2xl font-black text-white mb-8 border-b border-white/5 pb-6">{s.name}</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {s.topics.map(t => (
                                    <button key={t.id} onClick={() => toggle(s.id, t.id)} className={`flex items-center gap-4 p-5 rounded-2xl border text-left transition-all ${t.completed ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-white/5 border-white/5 text-slate-400 hover:bg-white/10'}`}>
                                        <Icon name={t.completed ? 'CheckCircle2' : 'PlayCircle'} size={18} />
                                        <span className={`text-sm font-bold ${t.completed ? 'line-through opacity-50' : ''}`}>{t.name}</span>
                                    </button>
                                ))}
                            </div>
                        </Card>
                    ))}
                </div>
            );
        };

        const SettingsPage = () => {
            const { examDate, setExamDate, preferences, updatePrefs } = useStudy();
            return (
                <div className="max-w-4xl mx-auto space-y-8">
                    <h1 className="text-4xl font-black text-white">System Settings</h1>
                    <Card className="space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="space-y-2"><label className="text-xs font-bold text-slate-500 uppercase">Exam Milestone</label><input type="date" value={examDate} onChange={e => setExamDate(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-2xl p-4 text-white outline-none focus:border-blue-500" /></div>
                            <div className="space-y-2"><label className="text-xs font-bold text-slate-500 uppercase">Daily Hours: {preferences.dailyHours}h</label><input type="range" min="1" max="12" value={preferences.dailyHours} onChange={e => updatePrefs({ dailyHours: Number(e.target.value) })} className="w-full mt-4 accent-blue-500 cursor-pointer" /></div>
                        </div>
                        <div className="pt-8 border-t border-white/5"><button onClick={() => { localStorage.clear(); window.location.reload(); }} className="bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-bold uppercase tracking-widest px-8 py-4 rounded-xl hover:bg-red-500/20 transition-all">Purge Neural Memory</button></div>
                    </Card>
                </div>
            );
        };

        // --- App Shell ---
        const App = () => {
            const { currentPath } = useRouter();
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const FramerMotion = window.FramerMotion || {};
            const { AnimatePresence, motion } = FramerMotion;

            const renderPage = () => {
                switch (currentPath) {
                    case '/dashboard': return <DashboardPage />;
                    case '/create-plan': return <StrategyPage />;
                    case '/revision': return <WorkstationPage />;
                    case '/settings': return <SettingsPage />;
                    default: return <DashboardPage />;
                }
            };

            return (
                <div className="min-h-screen bg-[#020617] text-slate-200">
                    <Sidebar isOpen={sidebarOpen} toggle={() => setSidebarOpen(!sidebarOpen)} />
                    <div className="lg:pl-72 min-h-screen flex flex-col">
                        <header className="h-20 border-b border-white/5 px-8 flex items-center justify-between sticky top-0 bg-[#020617]/90 backdrop-blur-2xl z-40">
                            <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 text-slate-400 bg-white/5 rounded-xl"><Icon name="Menu" /></button>
                            <div className="flex items-center gap-6">
                                <div className="text-right hidden sm:block"><p className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Active Stream</p><p className="text-sm font-bold text-white italic">Neural Flow Enabled</p></div>
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center font-black text-white italic shadow-lg">V</div>
                            </div>
                        </header>
                        <main className="p-4 md:p-8 flex-1">
                            {AnimatePresence ? (
                                <AnimatePresence mode="wait">
                                    <motion.div key={currentPath} initial={{ opacity: 0, x: 10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -10 }} transition={{ duration: 0.3 }}>
                                        {renderPage()}
                                    </motion.div>
                                </AnimatePresence>
                            ) : renderPage()}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StudyProvider><NeuralRouter><App /></NeuralRouter></StudyProvider>);
        document.getElementById('initial-loader').style.display = 'none';
    </script>
</body>

</html>
